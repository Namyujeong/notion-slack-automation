name: CI

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - "state/**"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check syntax
        run: npm run check

      - name: Check committed secrets
        run: npm run check:secrets

      - name: Run tests
        run: npm test
