name: Notion Operations meeting copy

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - apply
      force:
        description: "Create even if the target date already exists"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: notion-operations-meeting-copy
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Seoul
      RUN_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'apply' }}
      MEETING_FORCE_CREATE: ${{ github.event_name == 'workflow_dispatch' && inputs.force && '1' || '0' }}
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      MEETINGS_DATABASE_ID: ${{ vars.OPERATIONS_MEETINGS_DATABASE_ID }}
      SLACK_FAILURE_WEBHOOK_URL: ${{ secrets.SLACK_FAILURE_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Validate repository secret and variable
        run: npm run validate:config -- operations-meeting

      - name: Check meeting jobs
        run: npm run check:meeting

      - name: Run Operations meeting copy
        run: |
          if [ "$RUN_MODE" = "dry-run" ]; then
            npm run dry-run:operations
          else
            npm run run:operations
          fi

      - name: Notify failure
        if: failure()
        env:
          AUTOMATION_NAME: Notion Operations meeting copy
        run: node scripts/notify-workflow-failure.mjs
